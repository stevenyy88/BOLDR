version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: boldr_n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_SECURE_COOKIE=false
      - N8N_EDITOR_BASE_URL=http://192.168.1.85:5678
      - WEBHOOK_URL=http://192.168.1.85:5678/
      - N8N_PAYLOAD_SIZE_MAX=16
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=steve@digitalfutures.sg
      - N8N_BASIC_AUTH_PASSWORD=BolDR2026!demo
      - N8N_OWNER_EMAIL=steve@digitalfutures.sg
      - N8N_OWNER_PASSWORD=BolDR2026!demo
      - N8N_API_KEY=BOLDR_n8n_API_KEY_2026
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Asia/Singapore}
    depends_on:
      - chromadb
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  chromadb:
    image: chromadb/chroma:latest
    container_name: boldr_chromadb
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - CHROMA_HOST=0.0.0.0
      - CHROMA_PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v2/heartbeat || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  n8n_data:
  chroma_data: